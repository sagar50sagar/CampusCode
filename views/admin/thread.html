<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CampusCode</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ["Poppins", "sans-serif"] },
                    colors: {
                        primary: { 50: "#E7F0FA", 100: "#D0E1F5", 200: "#7BA4D0", 300: "#4D84C0", 400: "#2E5E99", 500: "#1E4A7A", 600: "#0D2440", DEFAULT: "#1E4A7A" },
                        dark: { bg: "#111827", card: "#1F2937", text: "#F9FAFB", border: "#374151" }
                    },
                },
            },
        };
    </script>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        .dark ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #7ba4d0; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #2e5e99; }
        
        .sidebar { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; }
        .sidebar.collapsed { width: 5rem; }
        .sidebar.collapsed .nav-item { justify-content: center; padding-left: 0; padding-right: 0; }
        .sidebar.collapsed .nav-item i { margin-right: 0; font-size: 1.25rem; }
        .sidebar.collapsed .nav-item span, .sidebar.collapsed .logo-text, .sidebar.collapsed .bottom-menu span { display: none; }
        .sidebar.collapsed .bottom-menu .nav-item { justify-content: center; }
        
        .nav-item { transition: all 0.2s ease; position: relative; display: flex; align-items: center; padding: 0.75rem 1rem; margin-bottom: 0.25rem; color: #374151; border-radius: 0.5rem; cursor: pointer; white-space: nowrap; text-decoration: none; }
        .nav-item:hover { background-color: #f3f4f6; }
        .dark .nav-item { color: #d1d5db; }
        .dark .nav-item:hover { background-color: #374151; }
        .nav-item.active { background-color: #d0e1f5; color: #1e4a7a; }
        .dark .nav-item.active { background-color: #1e4a7a; color: #ffffff; }
        .nav-item.active::before { content: ""; position: absolute; left: 0; top: 50%; transform: translateY(-50%); height: 60%; width: 4px; background-color: #2e5e99; border-radius: 0 4px 4px 0; }
        .dark .nav-item.active::before { background-color: #60a5fa; }
        .nav-item i { width: 1.5rem; text-align: center; margin-right: 0.75rem; font-size: 1.1rem; flex-shrink: 0; }
        .nav-item span { font-size: 0.875rem; font-weight: 500; }
    </style>
</head>

<body class="bg-gray-50 dark:bg-gray-900 font-sans text-slate-900 dark:text-slate-100 transition-colors overflow-hidden">
    <div class="flex h-screen overflow-hidden">
        
        <aside id="mainSidebar" class="sidebar w-64 bg-white dark:bg-gray-800 shadow-sm border-r border-gray-200 dark:border-gray-700 flex flex-col h-screen flex-shrink-0 transition-colors duration-200 z-50">
            <div class="p-6 flex-shrink-0 flex items-center justify-between h-[88px]">
                <h1 class="text-2xl font-bold text-gray-800 dark:text-white flex items-center gap-2 overflow-hidden whitespace-nowrap">
                    <i class="fas fa-code text-primary-500 text-2xl flex-shrink-0"></i>
                    <span class="logo-text transition-all duration-300 opacity-100 w-auto">CampusCode</span>
                </h1>
                <button id="sidebarToggleBtn" class="p-1.5 rounded-lg text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-primary-500 transition-colors focus:outline-none">
                    <i class="fas fa-chevron-left transition-transform duration-300"></i>
                </button>
            </div>

            <nav class="flex-1 px-4 space-y-1 overflow-y-auto mt-2">
                <a href="/college/dashboard" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
                <a href="/college/program" class="nav-item"><i class="fa-solid fa-layer-group"></i><span>Programs</span></a>
                <a href="/college/contest" class="nav-item"><i class="fas fa-trophy"></i><span>Contests</span></a>
                <a href="/college/manage_user" class="nav-item"><i class="fa-solid fa-users"></i><span>User</span></a>
                <a href="/college/community" class="nav-item active"><i class="fas fa-comments"></i><span>Community</span></a>
                <a href="/college/report" class="nav-item"><i class="fas fa-file-invoice"></i><span>Reports</span></a>
                <a href="/college/profile" class="nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
            </nav>

            <div class="p-4 space-y-1 border-t border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 flex-shrink-0 bottom-menu">
                <a href="/college/help_support" class="nav-item"><i class="far fa-question-circle"></i><span>Help & Support</span></a>
                <a href="/college/setting" class="nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
            </div>
        </aside>

        <div class="flex-1 flex flex-col overflow-hidden">
            
            <header class="bg-white dark:bg-gray-800 shadow-sm transition-colors duration-200 sticky top-0 z-40">
                <div class="px-8 py-3 flex justify-between items-center h-[88px]">
                    <div class="flex-1 max-w-2xl flex items-center gap-4">
                        <div class="relative flex items-center w-full">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-search text-gray-400"></i>
                            </div>
                            <input type="text" class="block w-full pl-10 pr-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm text-gray-900 dark:text-gray-100 placeholder-gray-500 focus:ring-2 focus:ring-primary-400 focus:border-transparent transition-all" placeholder="Search across programs, branches, subjects..." />
                        </div>
                    </div>

                    <div class="ml-4 flex items-center gap-3 relative">
                        <button id="themeToggleBtn" class="p-2 rounded-full text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 focus:outline-none transition-transform active:scale-95">
                            <i id="themeIcon" class="fas fa-moon text-xl transition-all duration-300"></i>
                        </button>

                        <div class="relative">
                            <button id="notificationBtn" class="p-2 rounded-full text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 focus:outline-none">
                                <i class="fas fa-bell text-xl"></i>
                                <span class="absolute top-0 right-0 h-2 w-2 rounded-full bg-red-500 border-2 border-white dark:border-gray-800"></span>
                            </button>
                            <div id="notifDropdown" class="hidden absolute right-0 mt-3 w-80 bg-white dark:bg-gray-800 rounded-xl shadow-xl border border-gray-100 dark:border-gray-700 z-50">
                                <div class="p-4 border-b border-gray-100 dark:border-gray-700 flex justify-between items-center">
                                    <h3 class="font-semibold text-gray-800 dark:text-white text-sm">Notifications</h3>
                                    <button class="text-xs text-primary-500 font-medium hover:text-primary-600">Mark all read</button>
                                </div>
                                <div class="max-h-64 overflow-y-auto p-4 text-center text-xs text-gray-500">
                                    No new notifications
                                </div>
                            </div>
                        </div>

                        <div class="relative">
                            <button id="profileDropdownBtn" class="ml-2 flex items-center gap-3 p-1 pr-3 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors focus:outline-none">
                                <div class="h-9 w-9 rounded-full bg-primary-500 flex items-center justify-center text-white font-bold text-sm" id="headerInitials">A</div>
                                <span class="text-sm font-medium text-gray-700 dark:text-gray-200 hidden sm:block" id="headerName">Admin</span>
                            </button>
                            <div id="profileDropdown" class="hidden absolute right-0 mt-3 w-48 bg-white dark:bg-gray-800 rounded-xl shadow-xl border border-gray-100 dark:border-gray-700 z-50 overflow-hidden">
                                <div class="p-2">
                                    <button id="logoutBtn" class="w-full flex items-center gap-2 px-4 py-2 text-sm text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-colors">
                                        <i class="fas fa-sign-out-alt"></i> Logout
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-4 sm:p-8 relative">
                <div class="max-w-4xl mx-auto space-y-6">
                    
                    <a href="/college/community" class="inline-flex items-center gap-2 text-sm font-medium text-gray-500 hover:text-primary-600 dark:text-gray-400 dark:hover:text-primary-400 transition-colors">
                        <i class="fas fa-arrow-left"></i> Back to Discussions
                    </a>

                    <div id="loadingState" class="flex justify-center items-center py-12">
                        <i class="fas fa-spinner fa-spin text-4xl text-primary-500"></i>
                    </div>

                    <div id="threadContainer" class="hidden bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden">
                        <div class="p-6 sm:p-8">
                            <div id="threadTags" class="flex flex-wrap gap-2 mb-4"></div>
                            
                            <h1 id="threadTitle" class="text-2xl sm:text-3xl font-bold text-gray-900 dark:text-white mb-6 leading-tight"></h1>
                            
                            <div class="flex items-center gap-4 mb-6">
                                <img id="threadAvatar" src="" alt="Author" class="w-12 h-12 rounded-full border border-gray-200 dark:border-gray-700 shadow-sm">
                                <div>
                                    <h3 id="threadAuthor" class="text-sm font-bold text-gray-900 dark:text-white"></h3>
                                    <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5"><span id="threadDate"></span> <span id="threadRole" class="ml-1"></span></p>
                                </div>
                            </div>

                            <div id="threadContent" class="prose dark:prose-invert max-w-none text-gray-700 dark:text-gray-300 text-[15px] leading-relaxed space-y-4"></div>

                            <div class="mt-8 pt-6 border-t border-gray-100 dark:border-gray-700 flex items-center gap-4">
                                <button class="flex items-center gap-2 px-4 py-2 rounded-xl bg-gray-50 dark:bg-gray-700/50 text-gray-600 dark:text-gray-300 hover:bg-primary-50 hover:text-primary-600 dark:hover:bg-primary-900/30 dark:hover:text-primary-400 transition-colors font-medium text-sm border border-gray-200 dark:border-gray-600 active:scale-95">
                                    <i class="fas fa-arrow-up"></i> <span id="threadUpvotes">0</span>
                                </button>
                                <button onclick="focusReplyBox()" class="flex items-center gap-2 px-4 py-2 rounded-xl bg-gray-50 dark:bg-gray-700/50 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-600 transition-colors font-medium text-sm border border-gray-200 dark:border-gray-600 active:scale-95">
                                    <i class="fas fa-arrow-down"></i> <span id="threadDownvotes">0</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div id="repliesWrapper" class="hidden space-y-6 pt-4">
                        <div class="flex items-center gap-3 mb-2">
                            <i class="fas fa-comments text-primary-500 text-xl"></i>
                            <h2 class="text-lg font-bold text-gray-900 dark:text-white whitespace-nowrap">
                                <span id="replyCount">0</span> Replies
                            </h2>
                            <div class="flex-1 h-px bg-gray-200 dark:bg-gray-700 ml-2"></div>
                        </div>
                        
                        <div id="repliesContainer" class="space-y-6"></div>
                    </div>

                    <div id="replyFormWrapper" class="hidden bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 p-6 sm:p-8 mt-8">
                        <form id="replyForm">
                            <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-4">Add your reply</h3>
                            <textarea id="replyContent" rows="4" required class="w-full rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-900 px-4 py-3 text-sm text-gray-900 dark:text-white focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition-all resize-y" placeholder="Write your response here. Be respectful and helpful..."></textarea>
                            <div class="mt-4 flex justify-between items-center">
                                <span class="text-xs text-gray-500"><i class="fab fa-markdown"></i> Markdown supported</span>
                                <button type="submit" id="submitReplyBtn" class="bg-primary-600 hover:bg-primary-700 text-white font-medium py-2.5 px-6 rounded-xl shadow-lg shadow-primary-500/30 transition-all transform active:scale-95 flex items-center gap-2">
                                    <i class="fas fa-paper-plane"></i> Post Reply
                                </button>
                            </div>
                        </form>
                    </div>

                </div>
            </main>
        </div>
    </div>

    <script>
        // --- Theme & Setup Logic ---
        const html = document.documentElement;
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const themeIcon = document.getElementById('themeIcon');
        
        function updateThemeIcon() {
            if (html.classList.contains('dark')) {
                themeIcon.classList.replace('fa-moon', 'fa-sun');
            } else {
                themeIcon.classList.replace('fa-sun', 'fa-moon');
            }
        }
        
        themeToggleBtn.addEventListener('click', () => {
            html.classList.toggle('dark');
            if (html.classList.contains('dark')) localStorage.theme = 'dark';
            else localStorage.theme = 'light';
            updateThemeIcon();
        });
        updateThemeIcon();

        // --- Sidebar & Navigation Logic ---
        document.getElementById('sidebarToggleBtn').addEventListener('click', () => {
            const sidebar = document.getElementById('mainSidebar');
            const icon = document.getElementById('sidebarToggleBtn').querySelector('i');
            sidebar.classList.toggle('collapsed');
            if (sidebar.classList.contains('collapsed')) {
                icon.classList.replace('fa-chevron-left', 'fa-chevron-right');
            } else {
                icon.classList.replace('fa-chevron-right', 'fa-chevron-left');
            }
        });

        // --- Dropdowns ---
        const notifBtn = document.getElementById('notificationBtn');
        const notifDropdown = document.getElementById('notifDropdown');
        const profileBtn = document.getElementById('profileDropdownBtn');
        const profileDropdown = document.getElementById('profileDropdown');

        notifBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            profileDropdown.classList.add('hidden');
            notifDropdown.classList.toggle('hidden');
        });

        profileBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            notifDropdown.classList.add('hidden');
            profileDropdown.classList.toggle('hidden');
        });

        window.addEventListener('click', () => {
            notifDropdown.classList.add('hidden');
            profileDropdown.classList.add('hidden');
        });

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            window.location.href = "/";
        });

        // ==========================================
        // THREAD DYNAMIC LOGIC
        // ==========================================

        // Extract Thread ID from the URL (e.g., /college/forum/thread/5)
        const currentThreadId = window.location.search.split('id=')[1] || window.location.pathname.split('/').pop();
        let currentUser = null;

        // Utility: Generate Avatar URL
        function getAvatar(name, bg = '1E4A7A') {
            return `https://ui-avatars.com/api/?name=${encodeURIComponent(name || 'U')}&background=${bg}&color=fff`;
        }

        // Utility: Format Time Ago
        function timeAgo(dateString) {
            if(!dateString) return 'recently';
            const date = new Date(dateString);
            const now = new Date();
            const seconds = Math.round((now - date) / 1000);
            const minutes = Math.round(seconds / 60);
            const hours = Math.round(minutes / 60);
            const days = Math.round(hours / 24);

            if (seconds < 60) return `${seconds} seconds ago`;
            if (minutes < 60) return `${minutes} mins ago`;
            if (hours < 24) return `${hours} hours ago`;
            if (days === 1) return `Yesterday`;
            return `${days} days ago`;
        }

        // Fetch User Context (For header profile)
        async function fetchUserContext() {
            try {
                const res = await fetch('/college/api/profile');
                const data = await res.json();
                if(data.success && data.user) {
                    currentUser = data.user;
                    document.getElementById('headerName').innerText = currentUser.fullName ? currentUser.fullName.split(' ')[0] : 'User';
                    document.getElementById('headerInitials').innerText = currentUser.fullName ? currentUser.fullName.charAt(0).toUpperCase() : 'U';
                }
            } catch(e) {}
        }

        // Load Thread Details
        async function loadThreadDetails() {
            try {
                // Adjust this URL to match your exact backend GET thread route.
                const res = await fetch(`/api/forum/threads/${currentThreadId}`);
                
                if (!res.ok) throw new Error('Thread not found');
                const data = await res.json();
                
                if (data.success && data.thread) {
                    const thread = data.thread;
                    
                    // Populate Thread Data
                    document.getElementById('threadTitle').innerText = thread.title || 'Untitled Thread';
                    document.getElementById('threadAuthor').innerText = thread.author_name || thread.fullName || 'Anonymous';
                    document.getElementById('threadDate').innerText = `Posted ${timeAgo(thread.created_at)}`;
                    
                    const roleTag = thread.role === 'admin' ? '<span class="text-primary-500 font-semibold text-xs ml-2 bg-blue-100 dark:bg-blue-900/40 px-2 py-0.5 rounded uppercase tracking-wider">ADMIN</span>' : '';
                    document.getElementById('threadRole').innerHTML = roleTag;
                    
                    document.getElementById('threadAvatar').src = getAvatar(thread.author_name || thread.fullName);
                    document.getElementById('threadContent').innerHTML = `<p>${(thread.content || '').replace(/\n/g, '<br>')}</p>`;
                    document.getElementById('threadUpvotes').innerText = thread.upvotes || 0;
                    document.getElementById('threadDownvotes').innerText = thread.downvotes || 0;

                    // Populate Tags
                    const tagsContainer = document.getElementById('threadTags');
                    tagsContainer.innerHTML = '';
                    if (thread.tags) {
                        const tags = Array.isArray(thread.tags) ? thread.tags : thread.tags.split(',');
                        tags.forEach(tag => {
                            if(tag.trim()) {
                                tagsContainer.innerHTML += `<span class="px-2.5 py-1 rounded-md text-xs font-medium bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-300"><i class="fas fa-tag mr-1"></i>${tag.trim()}</span>`;
                            }
                        });
                    }

                    // Reveal UI
                    document.getElementById('loadingState').classList.add('hidden');
                    document.getElementById('threadContainer').classList.remove('hidden');
                    document.getElementById('repliesWrapper').classList.remove('hidden');
                    document.getElementById('replyFormWrapper').classList.remove('hidden');
                } else {
                    document.getElementById('loadingState').innerHTML = `<p class="text-red-500">Error loading thread or thread does not exist.</p>`;
                }
            } catch (error) {
                console.error("Error fetching thread:", error);
                document.getElementById('loadingState').innerHTML = `<p class="text-gray-500">Failed to load thread details.</p>`;
            }
        }

        // Load Replies
        async function loadReplies() {
            try {
                const res = await fetch(`/api/forum/threads/${currentThreadId}/replies`);
                const data = await res.json();
                
                if (data.success) {
                    const replies = data.replies || [];
                    document.getElementById('replyCount').innerText = replies.length;
                    
                    const container = document.getElementById('repliesContainer');
                    
                    // UPDATED EMPTY STATE TO MATCH SCREENSHOT
                    if (replies.length === 0) {
                        container.innerHTML = `
                            <div class="border border-dashed border-gray-300 dark:border-gray-700 bg-transparent rounded-2xl p-12 flex flex-col items-center justify-center text-center">
                                <div class="w-12 h-12 rounded-full bg-gray-200 dark:bg-gray-700/50 flex items-center justify-center mb-4">
                                    <i class="fas fa-comment-slash text-gray-500 dark:text-gray-400 text-lg"></i>
                                </div>
                                <p class="text-sm font-medium text-gray-500 dark:text-gray-400">No replies yet. Be the first to share your thoughts!</p>
                            </div>
                        `;
                        return;
                    }

                    container.innerHTML = replies.map(reply => `
                        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 p-6">
                            <div class="flex items-center gap-3 mb-4">
                                <img src="${getAvatar(reply.author_name || reply.fullName, '0D2440')}" class="w-10 h-10 rounded-full border border-gray-200 dark:border-gray-700">
                                <div>
                                    <h3 class="text-sm font-bold text-gray-900 dark:text-white">
                                        ${reply.author_name || reply.fullName || 'User'} 
                                        ${reply.role === 'admin' ? '<span class="text-primary-500 font-semibold text-[10px] ml-2 bg-blue-100 dark:bg-blue-900/40 px-1.5 py-0.5 rounded uppercase tracking-wider">ADMIN</span>' : ''}
                                    </h3>
                                    <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">${timeAgo(reply.created_at)}</p>
                                </div>
                            </div>
                            <div class="text-gray-700 dark:text-gray-300 text-[15px] leading-relaxed mb-5">
                                ${(reply.content || '').replace(/\n/g, '<br>')}
                            </div>
                            <div class="flex items-center gap-3">
                                <button onclick="voteReply(${reply.id}, 'upvote')" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-gray-50 dark:bg-gray-700/50 text-gray-600 dark:text-gray-300 hover:bg-primary-50 hover:text-primary-600 dark:hover:bg-primary-900/30 dark:hover:text-primary-400 transition-colors font-medium text-xs border border-gray-200 dark:border-gray-600">
                                    <i class="fas fa-arrow-up"></i> ${reply.upvotes || 0}
                                </button>
                                <button onclick="voteReply(${reply.id}, 'downvote')" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-gray-50 dark:bg-gray-700/50 text-gray-600 dark:text-gray-300 hover:bg-red-50 hover:text-red-600 dark:hover:bg-red-900/20 dark:hover:text-red-400 transition-colors font-medium text-xs border border-gray-200 dark:border-gray-600">
                                    <i class="fas fa-arrow-down"></i> ${reply.downvotes || 0}
                                </button>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error("Error fetching replies:", error);
            }
        }

        // Handle Reply Posting
        document.getElementById('replyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const contentEl = document.getElementById('replyContent');
            const content = contentEl.value.trim();
            if (!content) return;

            const btn = document.getElementById('submitReplyBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Posting...';
            btn.disabled = true;

            try {
                const response = await fetch(`/api/forum/threads/${currentThreadId}/replies`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content })
                });
                const data = await response.json();
                
                if (response.ok && data.success) {
                    contentEl.value = '';
                    await loadReplies(); // Reload replies to show new answer
                } else {
                    alert(data.error || data.message || 'Failed to post reply');
                }
            } catch (error) {
                console.error('Reply error:', error);
                alert('A network error occurred while posting.');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        // Handle Voting
        async function voteReply(replyId, voteType) {
            try {
                const res = await fetch(`/api/forum/replies/${replyId}/vote`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ voteType })
                });
                const data = await res.json();
                if(data.success) {
                    loadReplies(); // Refresh votes
                } else {
                    alert(data.message || "Failed to vote");
                }
            } catch (err) {
                console.error(err);
            }
        }

        function focusReplyBox() {
            const el = document.getElementById('replyContent');
            el.focus();
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // Initialize Page
        document.addEventListener('DOMContentLoaded', () => {
            fetchUserContext();
            loadThreadDetails();
            loadReplies();
        });
    </script>
