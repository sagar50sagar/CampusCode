<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CampusCode</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ["Poppins", "sans-serif"] },
                    colors: {
                        primary: { 50: "#E7F0FA", 100: "#D0E1F5", 200: "#7BA4D0", 300: "#4D84C0", 400: "#2E5E99", 500: "#1E4A7A", 600: "#0D2440" },
                        dark: { bg: "#111827", card: "#1F2937", text: "#F9FAFB", border: "#374151" }
                    },
                },
            },
        };
        
        // Auto-apply dark mode if set in localStorage
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>

    <style>
        /* Smooth Input Focus to match setting.html */
        input:focus { outline: none; box-shadow: 0 0 0 3px rgba(30, 74, 122, 0.2); border-color: #1E4A7A; }
        .dark input:focus { box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2); border-color: #60a5fa; }
    </style>
</head>

<body class="bg-[#f8fafc] dark:bg-[#0f172a] min-h-screen font-sans flex items-center justify-center p-4 transition-colors duration-200 relative">

    <button id="themeToggleBtn" class="absolute top-6 right-6 p-3 rounded-full bg-white dark:bg-gray-800 text-gray-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-700 shadow-sm border border-gray-100 dark:border-gray-700 focus:outline-none transition-all z-50">
        <i class="fas fa-moon text-lg"></i>
    </button>

    <div class="w-full max-w-md bg-white dark:bg-gray-800 rounded-3xl shadow-xl border border-gray-100 dark:border-gray-700 overflow-hidden transform transition-all">
        
        <div class="bg-gradient-to-r from-[#1e4a7a] to-[#2e5e99] p-10 text-center text-white relative">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-full border-4 border-white/20 bg-white/10 mb-5 backdrop-blur-md shadow-inner">
                <i class="fas fa-unlock-alt text-3xl"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight">Forgot Password?</h1>
            <p class="text-primary-100 text-sm mt-2 font-medium">No worries, we'll send you reset instructions.</p>
        </div>

        <div class="p-8">
            <form id="forgotPasswordForm" class="space-y-6">
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Email Address</label>
                    <div class="relative">
                        <i class="far fa-envelope absolute left-4 top-4 text-gray-400"></i>
                        <input type="email" id="resetEmail" required placeholder="Enter your registered email" class="w-full pl-11 pr-4 py-3.5 rounded-xl border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-gray-100 text-sm transition-all">
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full py-3.5 bg-primary-500 hover:bg-primary-600 text-white rounded-xl text-sm font-bold shadow-md hover:shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
                    Send Reset Link <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="mt-8 text-center pt-6 border-t border-gray-100 dark:border-gray-700">
                <a href="setting.html" class="text-sm font-semibold text-gray-500 hover:text-primary-600 dark:text-gray-400 dark:hover:text-primary-400 transition-colors inline-flex items-center justify-center gap-2 group">
                    <i class="fas fa-arrow-left group-hover:-translate-x-1 transition-transform"></i> Back to Settings
                </a>
            </div>
        </div>
    </div>

    <script>
        // --- THEME TOGGLE LOGIC ---
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const htmlElement = document.documentElement;
        const themeIcon = themeToggleBtn.querySelector('i');

        function updateThemeIcon() {
            if (htmlElement.classList.contains('dark')) {
                themeIcon.classList.replace('fa-moon', 'fa-sun');
            } else {
                themeIcon.classList.replace('fa-sun', 'fa-moon');
            }
        }
        
        // Initial icon check
        updateThemeIcon();

        themeToggleBtn.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            localStorage.theme = htmlElement.classList.contains('dark') ? 'dark' : 'light';
            updateThemeIcon();
        });

        // --- FORM SUBMISSION LOGIC ---
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value;
            const btn = document.getElementById('submitBtn');

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

            try {
                // Adjust this endpoint to match your backend logic
                const res = await fetch('/college/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                // Simulating successful network response (adjust based on your API)
                if(res.ok || res.status === 200) {
                    btn.classList.remove('bg-primary-500', 'hover:bg-primary-600');
                    btn.classList.add('bg-green-500', 'hover:bg-green-600');
                    btn.innerHTML = '<i class="fas fa-check-circle"></i> Instructions Sent';
                    
                    alert(`If an account exists for ${email}, an email has been sent with reset instructions.`);
                } else {
                    throw new Error("Failed to send reset link");
                }
                
            } catch (err) {
                console.error('Forgot password error:', err);
                alert("An error occurred. Please try again.");
                btn.disabled = false;
                btn.innerHTML = 'Send Reset Link <i class="fas fa-arrow-right"></i>';
            }
        });
    </script>
</body>
</html>
