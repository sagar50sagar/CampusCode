<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join CampusCode | Faculty Registration</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ["Poppins", "sans-serif"] },
                    colors: {
                        primary: { 500: "#1E4A7A", 600: "#0D2440" }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex items-center justify-center p-4 transition-colors duration-200">

    <div class="bg-white dark:bg-gray-800 shadow-2xl rounded-3xl w-full max-w-[500px] overflow-hidden border border-gray-100 dark:border-gray-700">
        
        <div class="bg-primary-500 p-8 text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-full bg-white/5 opacity-30 pointer-events-none"></div>
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-white/20 text-white mb-4 backdrop-blur-sm">
                <i class="fas fa-user-plus text-xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-white tracking-wide">Faculty Registration</h2>
            <p class="text-blue-100 text-sm mt-2 font-medium">Join the CampusCode Ecosystem</p>
        </div>

        <div class="p-8">
            <form id="facultyForm" class="space-y-5">
                
                <input type="hidden" id="inviteToken">

                <div id="inviteDisplay" class="hidden mb-4 bg-blue-50 dark:bg-blue-900/20 border border-blue-100 dark:border-blue-800 rounded-xl p-3 flex items-center gap-3">
                    <i class="fas fa-ticket-alt text-primary-500"></i>
                    <div class="text-xs">
                        <p class="text-gray-500 dark:text-gray-400 uppercase font-bold">Invite Code Applied</p>
                        <p id="codeText" class="font-mono font-bold text-primary-500 dark:text-blue-400">Loading...</p>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 uppercase mb-2 ml-1">Full Name</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-4 top-3.5 text-gray-400"></i>
                        <input id="fullName" type="text" required placeholder="Dr. John Doe" 
                            class="w-full pl-10 pr-4 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 dark:text-white transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 uppercase mb-2 ml-1">Email Address</label>
                    <div class="flex gap-2">
                        <div class="relative flex-grow">
                            <i class="fas fa-envelope absolute left-4 top-3.5 text-gray-400"></i>
                            <input id="email" type="email" required placeholder="john@university.edu" 
                                class="w-full pl-10 pr-4 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 dark:text-white transition-all">
                        </div>
                        <button type="button" id="sendOtpBtn" 
                            class="bg-blue-100 text-blue-600 hover:bg-blue-200 px-4 py-3 rounded-xl text-sm font-bold transition-all whitespace-nowrap border border-blue-200 dark:bg-blue-900/30 dark:text-blue-400 dark:border-blue-800 disabled:opacity-50">
                            Send OTP
                        </button>
                    </div>
                </div>

                <div id="otpSection" class="hidden">
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 uppercase mb-2 ml-1">Enter OTP</label>
                    <div class="flex gap-2">
                        <div class="relative flex-grow">
                            <i class="fas fa-key absolute left-4 top-3.5 text-gray-400"></i>
                            <input id="otp" type="text" placeholder="123456" 
                                class="w-full pl-10 pr-4 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 dark:text-white transition-all">
                        </div>
                        <button type="button" id="verifyOtpBtn" 
                            class="bg-green-100 text-green-600 hover:bg-green-200 px-4 py-3 rounded-xl text-sm font-bold transition-all whitespace-nowrap border border-green-200 dark:bg-green-900/30 dark:text-green-400 dark:border-green-800">
                            Verify
                        </button>
                    </div>
                    <p id="otpMsg" class="text-xs mt-2 hidden"></p>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 uppercase mb-2 ml-1">Phone</label>
                        <input id="phone" type="text" required placeholder="+91 987..." 
                            class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 dark:text-white transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 uppercase mb-2 ml-1">Password</label>
                        <input id="password" type="password" required placeholder="******" 
                            class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 dark:text-white transition-all">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 uppercase mb-2 ml-1">Department</label>
                        <select id="department" required class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 dark:text-white transition-all appearance-none cursor-pointer">
                            <option value="" disabled selected>Loading Departments...</option>
                            </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 uppercase mb-2 ml-1">Designation</label>
                        <select id="designation" required class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 dark:text-white transition-all appearance-none cursor-pointer">
                            <option value="" disabled selected>Loading Roles...</option>
                            </select>
                    </div>
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full bg-primary-500 hover:bg-primary-600 text-white py-4 rounded-xl font-bold text-sm uppercase tracking-wider shadow-lg shadow-blue-900/20 transition-all mt-6 transform active:scale-95">
                    Submit Request
                </button>

            </form>

            <div id="successMsg" class="hidden text-center py-8">
                <div class="w-16 h-16 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                    <i class="fas fa-check"></i>
                </div>
                <h3 class="text-xl font-bold text-gray-800 dark:text-white">Request Submitted!</h3>
                <p class="text-gray-500 text-sm mt-2">Your profile is under review by the administrator.<br>You will be notified via email.</p>
                <a href="/login" class="inline-block mt-6 text-primary-500 font-bold text-sm hover:underline">Back to Login</a>
            </div>
            
            <div id="errorMsg" class="hidden mt-4 p-3 bg-red-50 border border-red-100 rounded-xl text-center">
                <p class="text-xs text-red-500 font-bold" id="errorText">Error occurred.</p>
            </div>

        </div>
    </div>

    <script>
    // 1. URL & Invite Logic
    const urlParams = new URLSearchParams(window.location.search);
    const inviteCode = urlParams.get('ref');

    if (inviteCode) {
        document.getElementById("inviteDisplay").classList.remove("hidden");
        document.getElementById("codeText").innerText = inviteCode;
        document.getElementById("inviteToken").value = inviteCode;
    }

    // =========================================================================
    // ⭐ NEW: DYNAMICALLY FETCH DEPARTMENTS & DESIGNATIONS FROM DATABASE
    // =========================================================================
    async function fetchMetadata() {
        const deptSelect = document.getElementById("department");
        const desigSelect = document.getElementById("designation");
        
        try {
            // Replace '/api/metadata' with whatever your backend route is named!
           const res = await fetch('/college/api/metadata');
            
            if (res.ok) {
                const data = await res.json();
                
                // Populate Departments from Database
                if (data.departments) {
                    deptSelect.innerHTML = '<option value="" disabled selected>Select Dept</option>';
                    data.departments.forEach(dept => {
                        deptSelect.innerHTML += `<option value="${dept}">${dept}</option>`;
                    });
                }
                
                // Populate Designations from Database
                if (data.designations) {
                    desigSelect.innerHTML = '<option value="" disabled selected>Select Role</option>';
                    data.designations.forEach(role => {
                        desigSelect.innerHTML += `<option value="${role}">${role}</option>`;
                    });
                }
            } else {
                throw new Error("Metadata API not found");
            }
        } catch (err) {
            console.log("Database fetch failed or endpoint missing. Loading safe defaults.");
            // SAFE FALLBACK: So your form still works even if the backend route isn't built yet
            deptSelect.innerHTML = `
                <option value="" disabled selected>Select Dept</option>
                <option value="CSE">CSE</option>
                <option value="IT">IT</option>
                <option value="ECE">ECE</option>
                <option value="ME">Mechanical</option>
                <option value="Civil">Civil</option>
            `;
            desigSelect.innerHTML = `
                <option value="" disabled selected>Select Role</option>
                <option value="Assistant Professor">Assistant Professor</option>
                <option value="Professor">Professor</option>
            `;
        }
    }

    // Load dynamic data as soon as page loads
    document.addEventListener('DOMContentLoaded', fetchMetadata);


    // 2. Handle OTP Sending (Cleaned up event listener)
    document.getElementById("sendOtpBtn").addEventListener("click", async () => {
        const email = document.getElementById("email").value;
        if (!email) return alert("Please enter email first");

        try {
            const res = await fetch('/auth/send-signup-otp', {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email })
            });
            const result = await res.json();
            if (result.success) {
                alert("OTP sent to your email!");
                document.getElementById("otpSection").classList.remove("hidden");
            } else {
                alert(result.message || "Failed to send OTP");
            }
        } catch (err) { alert("Error sending OTP from server."); }
    });

    // 3. Handle OTP Verification Button
    document.getElementById("verifyOtpBtn").addEventListener("click", () => {
        const otpVal = document.getElementById("otp").value;
        if(otpVal) {
            alert("OTP noted. Please click 'Submit Request' to complete registration.");
        } else {
            alert("Please enter the OTP first.");
        }
    });

    // 4. FIXED: Handle Form Submission safely
    document.getElementById("facultyForm").addEventListener("submit", async (e) => {
        e.preventDefault(); // Prevents default page reload
        
        const btn = document.getElementById("submitBtn");
        btn.disabled = true;
        btn.innerText = "Processing...";
        
        // Hide previous errors
        document.getElementById('errorMsg').classList.add('hidden');

        const data = {
            fullName: document.getElementById("fullName").value,
            email: document.getElementById("email").value,
            phone: document.getElementById("phone").value,
            password: document.getElementById("password").value,
            designation: document.getElementById("designation").value,
            department: document.getElementById("department").value,
            otp: document.getElementById("otp").value,
            inviteCode: inviteCode, 
            role: 'faculty'
        };

        try {
            const res = await fetch('/auth/register', {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            // If the server crashes or returns a 404 HTML page, this catches it securely!
            if (!res.ok) {
                const errorData = await res.json().catch(() => null);
                throw new Error(errorData?.message || errorData?.error || `Server Error: ${res.status}`);
            }

            const result = await res.json();
            
            if (result.success) {
                document.getElementById("facultyForm").style.display = "none";
                document.getElementById("successMsg").classList.remove("hidden");
            } else {
                throw new Error(result.error || result.message || "Registration failed. Try again.");
            }
        } catch (err) {
            // Show exact error on screen
            document.getElementById('errorText').innerText = err.message;
            document.getElementById('errorMsg').classList.remove('hidden');
            
            // Re-enable button so user can try again
            btn.disabled = false;
            btn.innerText = "Submit Request";
        }
    });
    </script>
</body>
</html>
