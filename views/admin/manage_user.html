  <script>
    async function downloadTemplate() {
        const btnText = document.getElementById('templateBtnText');
        const originalText = btnText.innerText;
        btnText.innerText = "Connecting...";

        if (typeof ExcelJS === 'undefined') {
            alert("🚨 Missing Library!");
            btnText.innerText = originalText;
            return;
        }

        let programList = [], branchList = [], sectionList = [], yearList = [];

        try {
            const [progRes, branchRes, secRes] = await Promise.all([
                fetch('/college/programs').then(r => r.json()),
                fetch('/college/branches').then(r => r.json()),
                fetch('/college/sections').then(r => r.json())
            ]);

            if (progRes.success) programList = [...new Set(progRes.data.map(p => p.name.toUpperCase()))];
            if (branchRes.success) branchList = [...new Set(branchRes.data.map(b => (b.abbreviation || b.name).toUpperCase()))];
            
            // ⭐ DYNAMIC YEAR LOGIC: Automatically calculates years from max semester in DB
            if (secRes.success && secRes.data.length > 0) {
                sectionList = [...new Set(secRes.data.map(s => s.name.toUpperCase()))];
                const maxSemester = Math.max(...secRes.data.map(s => parseInt(s.semester) || 1));
                const maxYear = Math.ceil(maxSemester / 2); 
                const yearLabels = ["1ST", "2ND", "3RD", "4TH", "5TH"];
                for(let i = 0; i < maxYear; i++) {
                    yearList.push(yearLabels[i] || `${i+1}TH`);
                }
            }

            if (programList.length === 0 || branchList.length === 0) {
                alert("🚨 Please add Programs and Branches in Academic Structure first.");
                btnText.innerText = originalText;
                return;
            }
        } catch (error) {
            alert("Connection Error. Check if server is running.");
            btnText.innerText = originalText;
            return;
        }

        btnText.innerText = "Generating...";

        try {
            const workbook = new ExcelJS.Workbook();
            const worksheet = workbook.addWorksheet('Template');
            
            const programOptions = `"${programList.join(',')}"`;
            const branchOptions = `"${branchList.join(',')}"`;
            const yearOptions = yearList.length > 0 ? `"${yearList.join(',')}"` : null;
            const sectionOptions = sectionList.length > 0 ? `"${sectionList.join(',')}"` : null;

            let headers = (activeTab === 'student') 
                ? ['Student Name', 'Student Email', 'Program', 'Branch', 'Year', 'Section', 'Role']
                : ['Faculty Name', 'Faculty Email', 'Role', 'Program', 'Branch'];

            worksheet.addRow(headers);

            for (let i = 2; i <= 500; i++) {
                if (activeTab === 'student') {
                    worksheet.getCell(`C${i}`).dataValidation = { type: 'list', formulae: [programOptions] };
                    worksheet.getCell(`D${i}`).dataValidation = { type: 'list', formulae: [branchOptions] };
                    if (yearOptions) worksheet.getCell(`E${i}`).dataValidation = { type: 'list', formulae: [yearOptions] };
                    if (sectionOptions) worksheet.getCell(`F${i}`).dataValidation = { type: 'list', formulae: [sectionOptions] };
                    worksheet.getCell(`G${i}`).dataValidation = { type: 'list', formulae: ['"student"'] };
                } else {
                    worksheet.getCell(`C${i}`).dataValidation = { type: 'list', formulae: ['"faculty"'] };
                    worksheet.getCell(`D${i}`).dataValidation = { type: 'list', formulae: [programOptions] };
                    worksheet.getCell(`E${i}`).dataValidation = { type: 'list', formulae: [branchOptions] };
                }
            }

            worksheet.columns.forEach(col => col.width = 22);
            worksheet.getRow(1).font = { bold: true };

            const buffer = await workbook.xlsx.writeBuffer();
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob([buffer]));
            link.download = `${activeTab}_template.xlsx`;
            link.click();
        } catch (e) { alert("Excel Error: " + e.message); }
        btnText.innerText = originalText;
    }
  </script>
</head>

<script>
// ====== CORE UI LOGIC ======
const sidebar = document.getElementById('mainSidebar');
const sidebarToggleBtn = document.getElementById('sidebarToggleBtn');
const toggleIcon = sidebarToggleBtn ? sidebarToggleBtn.querySelector('i') : null;
if (sidebarToggleBtn) {
    sidebarToggleBtn.addEventListener('click', () => {
        if (sidebar) sidebar.classList.toggle('collapsed');
        if (!toggleIcon) return;
        if (sidebar && sidebar.classList.contains('collapsed')) {
            toggleIcon.classList.replace('fa-chevron-left', 'fa-chevron-right');
        } else {
            toggleIcon.classList.replace('fa-chevron-right', 'fa-chevron-left');
        }
    });
}

const notificationBtn = document.getElementById('notificationBtn');
const notifDropdown = document.getElementById('notifDropdown');
if(notificationBtn) {
    notificationBtn.addEventListener('click', (e) => { e.stopPropagation(); notifDropdown.classList.toggle('hidden'); });
}

function toggleProfile() { document.getElementById('profileOverlay').classList.toggle('hidden'); }
document.addEventListener('click', (e) => {
    if (notifDropdown && !notifDropdown.contains(e.target) && !notificationBtn.contains(e.target)) notifDropdown.classList.add('hidden');
    if (e.target === document.getElementById('profileOverlay')) toggleProfile();
});

// ====== UNIFIED LOGOUT FUNCTION ======
async function performLogout(e) {
    if (e) e.preventDefault();
    try {
        await fetch('/auth/logout', { method: 'POST' });
    } catch(err) {
        console.warn("Logout request failed, redirecting anyway", err);
    }
    window.location.href = '/';
}

const logoutBtn = document.getElementById('logoutBtn');
if (logoutBtn) logoutBtn.addEventListener('click', performLogout);

// ====== THEME TOGGLE ======
const themeToggleBtn = document.getElementById('themeToggleBtn');
const themeIcon = themeToggleBtn ? themeToggleBtn.querySelector('i') : null;
const html = document.documentElement;
if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    html.classList.add('dark'); if(themeIcon) themeIcon.classList.replace('fa-moon', 'fa-sun');
} else {
    html.classList.remove('dark'); if(themeIcon) themeIcon.classList.replace('fa-sun', 'fa-moon');
}
if (themeToggleBtn) {
    themeToggleBtn.addEventListener('click', () => {
        html.classList.toggle('dark');
        if (html.classList.contains('dark')) { localStorage.theme = 'dark'; if (themeIcon) themeIcon.classList.replace('fa-moon', 'fa-sun'); }
        else { localStorage.theme = 'light'; if (themeIcon) themeIcon.classList.replace('fa-sun', 'fa-moon'); }
    });
}

// ====== DYNAMIC DATA LOGIC ======
let activeTab = localStorage.getItem('activeTab') || 'student';
let modalUserType = 'student';
let users = [];
let requests = [];
let editingId = null; 
let dbPrograms = []; 
let dbBranches = []; 
let dbSections = []; // Added for dynamic year/section hierarchy

async function fetchData() {
    try {
        const profileRes = await fetch('/college/api/profile');
        if(profileRes.ok) {
            const pData = await profileRes.json();
            const u = pData.user || pData;
            
            if(u.fullName) {
                document.getElementById('headerName').textContent = u.fullName;
                document.getElementById('modalName').textContent = u.fullName;
                const nameParts = u.fullName.split(' ');
                const initials = nameParts.length > 1 ? (nameParts[0][0] + nameParts[1][0]).toUpperCase() : nameParts[0].substring(0,2).toUpperCase();
                document.getElementById('headerInitials').textContent = initials;
                document.getElementById('modalInitials').textContent = initials;
            }
            if(u.collegeName) {
                document.getElementById('modalCollege').innerHTML = `<i class="fas fa-university"></i> ${u.collegeName}`;
            }
            if(u.role) {
                document.getElementById('modalRoleDisplay').innerHTML = `Role: ${u.role.charAt(0).toUpperCase() + u.role.slice(1)}`;
            }
        }

        const resUsers = await fetch('/college/api/users');
        if(resUsers.ok) {
            const data = await resUsers.json();
            const list = data.users || data || [];
            
            users = list.map(u => ({
                id: u.id,
                fullName: u.fullName || '',
                email: u.email || '',
                role: u.role,
                type: (u.role && u.role.toLowerCase() === 'student') ? 'student' : 'faculty',
                branch: u.branch || '', 
                is_hod: (String((u.role || '')).toLowerCase() === 'hod') ? 1 : (Number(u.is_hod) || 0),
                status: u.status || 'Active',
                last_active: u.last_active || 'N/A',
                program: u.program || '',
                year: u.year || '',
                section: u.section || '',
                contests_participated: u.contests_participated || 0,
                problems_solved: u.problems_solved || 0,
                contests_won: u.contests_won || 0,
                streak: u.streak || 0,
                college_rank: u.college_rank || '-',
                global_rank: u.global_rank || '-',
                level: u.level || 1,
                contests_created: u.contests_created || 0,
                problems_created: u.problems_created || 0,
                rating: u.rating || '0.0'
            }));
        }

        // Fetch hierarchy datasets
        const resPrograms = await fetch('/college/programs');
        if (resPrograms.ok) dbPrograms = (await resPrograms.json()).data || [];

        const resBranches = await fetch('/college/branches');
        if (resBranches.ok) dbBranches = (await resBranches.json()).data || [];

        const resSec = await fetch('/college/sections');
        if (resSec.ok) dbSections = (await resSec.json()).data || [];

        const resReq = await fetch('/college/api/pending-faculty');
        if(resReq.ok) {
            const rData = await resReq.json();
            requests = rData.pending || [];
        }

        const pendingCount = requests.length;
        const badge = document.getElementById('requestBadge');
        const headerBadge = document.getElementById('notifBadgeHeader');
        
        if(badge) {
            badge.innerText = pendingCount;
            badge.style.display = pendingCount > 0 ? 'inline-block' : 'none';
        }
        if(headerBadge) {
            if(pendingCount > 0) headerBadge.classList.remove('hidden');
            else headerBadge.classList.add('hidden');
        }

        setTab(activeTab); 

    } catch (err) {
        console.error("Error fetching dynamic data:", err);
    }
}

function setTab(tab) {
    activeTab = tab;
    localStorage.setItem('activeTab', tab); 

    const onboardBtn = document.getElementById('onboardBtn');
    const bulkInviteSection = document.getElementById('bulkInviteSection'); 

    if (tab === 'requests') {
        if(onboardBtn) onboardBtn.style.display = 'none';
        if(bulkInviteSection) bulkInviteSection.style.display = 'none';
    } else {
        if(onboardBtn) onboardBtn.style.display = 'block';
        if(bulkInviteSection) bulkInviteSection.style.display = 'block';
    }

    ['tabStudent', 'tabFaculty', 'tabRequests'].forEach(id => {
        const el = document.getElementById(id);
        if (el) {
            if (id.toLowerCase().includes(tab)) {
                el.className = 'px-10 py-3 rounded-xl text-sm font-bold transition-all tab-active';
            } else {
                el.className = 'px-10 py-3 rounded-xl text-sm font-bold text-gray-500 transition-all';
            }
        }
    });

    render();
}

// ⭐ HIERARCHY LOGIC: Filters branches inside inline "Requests" row
function updateRowBranch(id, programName) {
    const branchSelect = document.getElementById(`branch-${id}`);
    const program = dbPrograms.find(p => p.name === programName);
    branchSelect.innerHTML = '<option value="" disabled selected>Branch</option>';
    if (program) {
        dbBranches.filter(b => b.program_id === program.id).forEach(b => {
            branchSelect.innerHTML += `<option value="${b.name}">${b.name}</option>`;
        });
    }
}

// ⭐ HIERARCHY LOGIC: Update Branches based on chosen program
function filterBranches(programName, selectedBranch = '') {
    const branchSelect = document.getElementById('modalBranch');
    if(!branchSelect) return;
    
    const program = dbPrograms.find(p => p.name === programName);
    branchSelect.innerHTML = '<option value="">Select Branch</option>';
    
    if (program) {
        dbBranches.filter(b => b.program_id === program.id).forEach(b => {
            branchSelect.innerHTML += `<option value="${b.name}" ${selectedBranch === b.name ? 'selected' : ''}>${b.name}</option>`;
        });
    }
}

// ⭐ HIERARCHY LOGIC: Update Years/Sections based on chosen branch
function filterYearsSections(branchName, selectedYear = '', selectedSection = '') {
    const yearSelect = document.getElementById('modalYear');
    const sectionSelect = document.getElementById('modalSection');
    if(!yearSelect || !sectionSelect) return;

    const branch = dbBranches.find(b => b.name === branchName);
    yearSelect.innerHTML = '<option value="">Select Year</option>';
    sectionSelect.innerHTML = '<option value="">Select Section</option>';

    if (branch) {
        const branchSections = dbSections.filter(s => s.branch_id === branch.id);
        
        const years = [...new Set(branchSections.map(s => s.year))].sort();
        years.forEach(y => { yearSelect.innerHTML += `<option value="${y}" ${selectedYear == y ? 'selected' : ''}>${y}</option>`; });

        const sections = [...new Set(branchSections.map(s => s.name))].sort();
        sections.forEach(s => { sectionSelect.innerHTML += `<option value="${s}" ${selectedSection === s ? 'selected' : ''}>${s}</option>`; });
    }
}

function openAddModal() {
    editingId = null;
    document.getElementById('modalTitle').innerText = 'Onboard Member';
    document.getElementById('modalSaveBtn').innerText = 'Save User';
    setModalUserType(activeTab === 'requests' ? 'student' : activeTab);
    document.getElementById('addModal').classList.remove('hidden');
    document.getElementById('addModal').classList.add('flex');
}

function closeAddModal() {
    document.getElementById('addModal').classList.add('hidden');
    document.getElementById('addModal').classList.remove('flex');
}

function openEditModal(id) {
    const user = users.find(u => u.id === id);
    if (!user) return;
    
    editingId = id;
    document.getElementById('modalTitle').innerText = 'Edit Member';
    document.getElementById('modalSaveBtn').innerText = 'Update User';
    
    setModalUserType(user.type, user);
    
    document.getElementById('addModal').classList.remove('hidden');
    document.getElementById('addModal').classList.add('flex');
}

function setModalUserType(type, userData = {}) {
    modalUserType = type;
    document.getElementById('modalUserType').value = type;
    
    if (type === 'student') {
        document.getElementById('modalTabStudent').className = 'flex-1 py-2 text-xs font-bold rounded-lg modal-tab-active';
        document.getElementById('modalTabFaculty').className = 'flex-1 py-2 text-xs font-bold rounded-lg text-gray-500 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors';
        renderModalFields('student', userData);
    } else {
        document.getElementById('modalTabFaculty').className = 'flex-1 py-2 text-xs font-bold rounded-lg modal-tab-active';
        document.getElementById('modalTabStudent').className = 'flex-1 py-2 text-xs font-bold rounded-lg text-gray-500 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors';
        renderModalFields('faculty', userData);
    }
}

            ${!userData.id ? '<p class="text-[10px] text-gray-500 mt-1">This default password will be sent to the user\'s email.</p>' : ''}

                <select id="modalProgram" onchange="filterBranches(this.value)" class="w-full p-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-sm outline-none dark:text-white">

                <select id="modalBranch" onchange="filterYearsSections(this.value)" class="w-full p-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-sm outline-none dark:text-white">

                <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">Year</label>

                    <option value="">Select Year</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">Section</label>
                <select id="modalSection" class="w-full p-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-sm outline-none dark:text-white">
                    <option value="">Select Section</option>
                </select>
            </div>
        `;
    } else {
        html += `
            <div class="col-span-2">
                <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">Program</label>
                <select id="modalProgram" onchange="filterBranches(this.value)" class="w-full p-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-sm outline-none dark:text-white">
                    ${programOptions}
                </select>
            </div>
            <div class="col-span-2">
                <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">Branch</label>
                <select id="modalBranch" class="w-full p-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-sm outline-none dark:text-white">
                     <option value="">Select Branch</option>
                </select>
            </div>
        `;
    }
    
    mf.innerHTML = html;

    // Trigger cascades immediately if loading existing user values
    if(userData.program) {
        filterBranches(userData.program, userData.branch);
        if(userData.branch && type === 'student') {
            filterYearsSections(userData.branch, userData.year, userData.section);
        }
    }
}

async function saveUser() {
    const fullName = document.getElementById('modalFullName').value.trim();
    const email = document.getElementById('modalEmail').value.trim();
    
    const password = document.getElementById('modalPassword') ? document.getElementById('modalPassword').value.trim() : null;
    
    if(!fullName || !email) { alert("Name and Email are required!"); return; }
    
    if(!editingId && !password) {
        alert("A default password is required for new members!"); 
        return; 
    }
    
    const payload = { 
        fullName, 
        email, 
        role: modalUserType,
        program: document.getElementById('modalProgram') ? document.getElementById('modalProgram').value : null,
        branch: document.getElementById('modalBranch') ? document.getElementById('modalBranch').value : null
    };

    if (password) {
        payload.password = password;
    }

    if (modalUserType === 'student') {
        payload.year = document.getElementById('modalYear').value;
        payload.section = document.getElementById('modalSection').value;
    }
    
    try {
        let url = '/college/api/users';
        let method = 'POST';
        
        if(editingId) {
            url = `/college/api/users/${editingId}`;
            method = 'PUT';
        }
        
        const res = await fetch(url, {
            method,
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        
        const data = await res.json();
        if(data.success) {
            closeAddModal();
            fetchData();
        } else {
            alert(data.error || "Failed to save user.");
        }
    } catch(err) {
        console.error(err);
        alert("An error occurred while saving.");
    }
}

async function deleteUser(id, type) {
    if(!confirm(`Are you sure you want to delete this ${type}?`)) return;
    try {
        const res = await fetch(`/college/api/users/${id}`, { method: 'DELETE' });
        const data = await res.json();
        if(data.success) {
            fetchData();
        } else {
            alert(data.error || "Failed to delete user.");
        }
    } catch(err) {
        console.error(err);
    }
}

async function toggleHOD(id, currentStatus) {
    const newStatus = Number(currentStatus) === 1 ? 0 : 1;
    const action = newStatus === 1 ? 'make HOD' : 'remove HOD status';
    
    const user = users.find(u => u.id === id);

    if (newStatus === 1 && user) {
        const existingHOD = users.find(u => 
            (Number(u.is_hod) === 1 || String(u.role || '').toLowerCase() === 'hod') && 
            u.id !== id && 
            u.branch === user.branch && 
            u.program === user.program
        );
        
        if (existingHOD) {
            const programName = user.program || 'this program';
            const branchName = user.branch || 'this branch';
            alert(`Cannot make HOD. An HOD already exists for ${programName} - ${branchName}: ${existingHOD.fullName}`);
            return; 
        }
    }
    
    if(!confirm(`Are you sure you want to ${action} for this faculty member?`)) return;
    
    try {
        const res = await fetch(`/college/api/faculty/${id}/hod`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ is_hod: newStatus })
        });
        
        const data = await res.json();
        if(data.success) {
            fetchData(); 
        } else {
            alert(data.error || "Failed to update HOD status.");
        }
    } catch(err) {
        console.error(err);
        alert("An error occurred while updating HOD status.");
    }
}

async function verifyAndAssign(event, id) {
    event.preventDefault();

// ====== EXCEL UPLOAD AND DOWNLOAD LOGIC ======
async function exportToExcel() {
    if (typeof XLSX === 'undefined') {
        alert("🚨 Missing Library for Exporting Excel!");
        return;
    }
    if (users.length === 0) { 
        alert("No users to export"); 
        return; 
    }
    
    const filteredUsers = users.filter(u => u.type === activeTab);
    if(filteredUsers.length === 0) {
        alert(`No ${activeTab} data to export.`);
        return;
    }
    
    const wsData = filteredUsers.map(u => ({
        ID: u.id,
        Name: u.fullName,
        Email: u.email,
        Role: u.type,
        Program: u.program || '-',
        Branch: u.branch || '-',
        Year: u.year || '-',
        Section: u.section || '-',
        Status: u.status
    }));

    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.json_to_sheet(wsData);
    XLSX.utils.book_append_sheet(wb, ws, `${activeTab}_List`);
    XLSX.writeFile(wb, `CampusCode_${activeTab}.xlsx`);
}

async function handleExcelUpload(event) {
    const file = event.target.files[0];
    if (!file) return;

    if (typeof XLSX === 'undefined') {
        alert("🚨 Missing Library for Uploading Excel!");
        return;
    }

    const reader = new FileReader();
    reader.onload = async (e) => {
        try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheetName = workbook.SheetNames[0];
            const sheet = workbook.Sheets[sheetName];
            const jsonData = XLSX.utils.sheet_to_json(sheet, { defval: "" });

            const defaultPassword = prompt("Please enter a default password for the new users:", "Welcome@123");
            if (!defaultPassword) {
                alert("Upload cancelled: Default password is required.");
                event.target.value = ''; 
                return;
            }

            const processedData = jsonData.map(row => {
                const normalizedRow = {};
                for (const key in row) {
                    normalizedRow[key.trim().toLowerCase()] = row[key];
                }
                return {
                    fullName: normalizedRow['student name'] || normalizedRow['faculty name'] || normalizedRow['name'],
                    email: normalizedRow['student email'] || normalizedRow['faculty email'] || normalizedRow['email'],
                    role: normalizedRow['role'] ? normalizedRow['role'].toLowerCase() : (normalizedRow['student name'] ? 'student' : 'faculty'),
                    program: String(normalizedRow['program'] || '').toUpperCase(),
                    branch: String(normalizedRow['branch'] || '').toUpperCase(),
                    year: String(normalizedRow['year'] || '').toUpperCase(),
                    section: String(normalizedRow['section'] || '').toUpperCase(),
                    defaultPassword: defaultPassword 
                };
            }).filter(user => user.fullName && user.email); 
            
            if (processedData.length === 0) {
                 alert("No valid users found. Please make sure the 'Name' and 'Email' columns contain data.");
                 return;
            }

            // Hit the API to Bulk Import
            const res = await fetch('/college/api/users/bulk', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ users: processedData })
            });

            const result = await res.json();
            if (result.success) {
                alert(result.message || `Upload successful!`);
                fetchData(); // This instantly refreshes the table!
            } else {
                alert(result.error || result.message || "Failed to import users.");
            }

        } catch (error) {
            console.error("Error processing file:", error);
            alert("An error occurred while reading the Excel file. Check the format.");
        } finally {
            event.target.value = ''; // Reset input so you can re-upload if needed
        }
    };
    reader.readAsArrayBuffer(file);
}

document.addEventListener('DOMContentLoaded', fetchData);
