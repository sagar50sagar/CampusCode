<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faculty Profile - CampusCode</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ["Poppins", "sans-serif"] },
                    colors: {
                        primary: { 50: "#E7F0FA", 100: "#D0E1F5", 200: "#7BA4D0", 300: "#4D84C0", 400: "#2E5E99", 500: "#1E4A7A", 600: "#0D2440" },
                        dark: { bg: "#111827", card: "#1F2937", text: "#F9FAFB", border: "#374151" }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                },
            },
        };
    </script>
</head>

<body class="bg-gray-50 dark:bg-gray-900 min-h-screen font-sans transition-colors duration-200 text-gray-800 dark:text-gray-200">

    <nav class="bg-white dark:bg-gray-800 shadow-sm border-b border-gray-100 dark:border-gray-700 px-6 py-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-gray-50 hover:bg-gray-100 dark:bg-gray-700/50 dark:hover:bg-gray-700 border border-gray-200 dark:border-gray-600 transition-all text-gray-600 dark:text-gray-300 hover:scale-105 group">
                    <i class="fas fa-arrow-left group-hover:-translate-x-1 transition-transform"></i>
                </button>
                <h1 class="text-xl font-bold text-gray-900 dark:text-white">Faculty <span class="text-primary-600 dark:text-blue-400">Directory</span></h1>
            </div>
        </div>
    </nav>
    <div id="loadingState" class="max-w-3xl mx-auto px-4 py-32 text-center flex flex-col items-center justify-center animate-fade-in">
        <div class="relative w-20 h-20 mb-6">
            <div class="absolute inset-0 border-4 border-primary-100 dark:border-gray-700 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-primary-600 dark:border-blue-500 rounded-full border-t-transparent animate-spin"></div>
        </div>
        <h2 class="text-xl font-semibold text-gray-800 dark:text-white mb-2" id="loadingTitle">Loading Profile Data</h2>
        <p class="text-gray-500 dark:text-gray-400" id="loadingText">Fetching faculty information from the database...</p>
    </div>

    <main id="profileContent" class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8 hidden animate-fade-in">
        
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden mb-8">
            <div class="bg-gradient-to-br from-[#1E4A7A] to-[#153255] relative pt-16 pb-24 px-6 text-center">
                <span id="fac-status" class="absolute top-4 right-4 px-3 py-1 text-xs font-semibold rounded-full bg-white/10 text-white backdrop-blur-md border border-white/20 uppercase tracking-wide">
                    Loading
                </span>
                
                <div class="absolute left-1/2 bottom-[-56px] -translate-x-1/2">
                    <div class="relative w-32 h-32 rounded-full p-2 bg-white dark:bg-gray-800 ring-4 ring-[#1E4A7A]/10 dark:ring-gray-700 shadow-xl">
                        <div id="fac-avatar" class="w-full h-full rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white text-4xl font-bold shadow-inner">
                            --
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="pt-20 pb-10 px-6 text-center">
                <h1 id="fac-name" class="text-3xl font-bold text-gray-900 dark:text-white mb-1">--</h1>
                <p id="fac-role-display" class="text-sm font-medium text-gray-500 dark:text-gray-400 mb-4">--</p>
                
                <div class="flex items-center justify-center gap-3 flex-wrap mb-8">
                    <span class="px-4 py-1.5 rounded-full text-xs font-semibold bg-blue-50 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300 border border-blue-100 dark:border-blue-800 flex items-center gap-1.5">
                        <i class="fas fa-building text-blue-500"></i> <span id="fac-dept">--</span> Dept
                    </span>
                    <span class="px-4 py-1.5 rounded-full text-xs font-semibold bg-purple-50 text-purple-700 dark:bg-purple-900/30 dark:text-purple-300 border border-purple-100 dark:border-purple-800 flex items-center gap-1.5" id="fac-college">
                        <i class="fas fa-university text-purple-500"></i> --
                    </span>
                </div>

                <div class="flex justify-center gap-4">
                    <div class="px-5 py-2.5 rounded-xl bg-gray-50 dark:bg-gray-700/50 border border-gray-200 dark:border-gray-600 flex items-center gap-2">
                        <i class="fas fa-id-badge text-gray-400 dark:text-gray-500"></i>
                        <span class="text-sm font-bold text-gray-700 dark:text-gray-200">FAC-<span id="fac-id-val">--</span></span>
                    </div>
                    <a id="fac-email" href="#" class="px-6 py-2.5 rounded-xl text-sm font-semibold bg-primary-600 hover:bg-primary-700 text-white transition-all hover:-translate-y-0.5 shadow-md hover:shadow-lg flex items-center gap-2">
                        <i class="fas fa-envelope"></i> Contact
                    </a>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
            
            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm p-6 border border-gray-100 dark:border-gray-700 relative overflow-hidden group hover:-translate-y-1 transition-transform duration-200">
                <div class="relative z-10 flex justify-between items-start">
                    <div>
                        <p class="text-sm font-medium text-gray-500 dark:text-gray-400">Problems Created</p>
                        <h3 id="stat-prob" class="text-3xl font-bold text-gray-900 dark:text-white mt-2">0</h3>
                    </div>
                    <div class="p-3 bg-blue-500/10 rounded-lg text-blue-500 dark:text-blue-400">
                        <i class="fas fa-code text-xl"></i>
                    </div>
                </div>
                <div class="absolute -bottom-4 -right-4 w-24 h-24 bg-blue-500/10 rounded-full blur-2xl group-hover:bg-blue-500/20 transition-colors"></div>
            </div>

            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm p-6 border border-gray-100 dark:border-gray-700 relative overflow-hidden group hover:-translate-y-1 transition-transform duration-200">
                <div class="relative z-10 flex justify-between items-start">
                    <div>
                        <p class="text-sm font-medium text-gray-500 dark:text-gray-400">Hosted Contests</p>
                        <h3 id="stat-cont" class="text-3xl font-bold text-gray-900 dark:text-white mt-2">0</h3>
                    </div>
                    <div class="p-3 bg-purple-500/10 rounded-lg text-purple-500 dark:text-purple-400">
                        <i class="fas fa-trophy text-xl"></i>
                    </div>
                </div>
                <div class="absolute -bottom-4 -right-4 w-24 h-24 bg-purple-500/10 rounded-full blur-2xl group-hover:bg-purple-500/20 transition-colors"></div>
            </div>

            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm p-6 border border-gray-100 dark:border-gray-700 relative overflow-hidden group hover:-translate-y-1 transition-transform duration-200 md:col-span-2 lg:col-span-1">
                <div class="relative z-10 flex justify-between items-start">
                    <div>
                        <p class="text-sm font-medium text-gray-500 dark:text-gray-400">Platform Rating</p>
                        <h3 id="stat-rating" class="text-3xl font-bold text-gray-900 dark:text-white mt-2">0.0 <i class="fas fa-star text-sm text-yellow-400 ml-1"></i></h3>
                    </div>
                    <div class="p-3 bg-yellow-500/10 rounded-lg text-yellow-600 dark:text-yellow-400">
                        <i class="fas fa-chart-line text-xl"></i>
                    </div>
                </div>
                <div class="absolute -bottom-4 -right-4 w-24 h-24 bg-yellow-500/10 rounded-full blur-2xl group-hover:bg-yellow-500/20 transition-colors"></div>
            </div>

        </div>

        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm p-8 border border-gray-100 dark:border-gray-700">
            <h2 class="text-xl font-bold text-gray-800 dark:text-white mb-4 flex items-center gap-2">
                <i class="fas fa-user-circle text-primary-500"></i> Professional Summary
            </h2>
            <div class="p-5 rounded-xl bg-gray-50 dark:bg-gray-700/30 border border-gray-100 dark:border-gray-700">
                <p id="fac-bio" class="text-gray-600 dark:text-gray-300 leading-relaxed text-[15px]">
                    Loading professional summary...
                </p>
            </div>
            
            <hr class="border-gray-100 dark:border-gray-700 my-8">
            
            <h2 class="text-xl font-bold text-gray-800 dark:text-white mb-4 flex items-center gap-2">
                <i class="fas fa-history text-primary-500"></i> Recent Activity
            </h2>
            <div id="faculty-activity" class="space-y-3"></div>
        </div>

            </main>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', async () => {
        const loadingState = document.getElementById('loadingState');
        const profileContent = document.getElementById('profileContent');
        const loadingTitle = document.getElementById('loadingTitle');
        const loadingText = document.getElementById('loadingText');

        const showError = (message) => {
            document.querySelector('#loadingState .relative').innerHTML = '<i class="fas fa-exclamation-triangle text-6xl text-red-500 mb-6"></i>';
            loadingTitle.textContent = "Oops! Could not load profile.";
            loadingTitle.className = "text-2xl font-bold text-red-600 dark:text-red-400 mb-2";
            loadingText.textContent = message;
            loadingText.className = "text-gray-600 dark:text-gray-300 font-medium";
        };
        const activityContainer = document.getElementById('faculty-activity');

        const escapeHtml = (value) => String(value ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');

        const formatDate = (value) => {
            const date = value ? new Date(value) : null;
            return date && !Number.isNaN(date.getTime())
                ? date.toLocaleString()
                : 'Recently';
        };

        const renderRecentActivity = (items = []) => {
            if (!Array.isArray(items) || items.length === 0) {
                activityContainer.innerHTML = `
                    <div class="p-10 border-2 border-dashed border-gray-200 dark:border-gray-700 rounded-xl flex flex-col items-center justify-center text-center">
                        <div class="w-16 h-16 rounded-full bg-gray-50 dark:bg-gray-800 flex items-center justify-center mb-4 border border-gray-100 dark:border-gray-700">
                            <i class="fas fa-folder-open text-3xl text-gray-300 dark:text-gray-600"></i>
                        </div>
                        <p class="text-gray-500 dark:text-gray-400 font-medium text-sm">No public problems or contests available to display yet.</p>
                    </div>`;
                return;
            }

            activityContainer.innerHTML = items.map((item) => {
                const type = String(item.type || 'activity').toLowerCase();
                const icon = type === 'contest' ? 'fa-trophy' : 'fa-code';
                const chipClasses = type === 'contest'
                    ? 'bg-purple-100 text-purple-700 dark:bg-purple-900/30 dark:text-purple-300'
                    : 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300';

                return `
                    <div class="rounded-xl border border-gray-100 dark:border-gray-700 bg-gray-50 dark:bg-gray-700/20 p-4">
                        <div class="flex items-start justify-between gap-4">
                            <div class="min-w-0">
                                <div class="flex items-center gap-2 mb-2">
                                    <span class="w-9 h-9 rounded-lg bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 flex items-center justify-center text-primary-600 dark:text-blue-400">
                                        <i class="fas ${icon}"></i>
                                    </span>
                                    <span class="px-2.5 py-1 rounded-full text-xs font-semibold uppercase ${chipClasses}">${escapeHtml(type)}</span>
                                </div>
                                <h3 class="text-base font-semibold text-gray-900 dark:text-white truncate">${escapeHtml(item.title || 'Untitled')}</h3>
                                <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Status: ${escapeHtml(item.status || 'draft')} • ${formatDate(item.activityAt)}</p>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        };

        const urlParams = new URLSearchParams(window.location.search);
        const facultyId = urlParams.get('id');
        const apiBasePath = window.location.pathname.replace(/\/view_faculty(?:\.html)?\/?$/, '');

        if (!facultyId) {
            showError("No Faculty ID was provided in the link.");
            return;
        }

        try {
            // Fetch data from backend
            const response = await fetch(`${apiBasePath}/api/faculty/public-profile/${facultyId}`);
            
            if (!response.ok) throw new Error(`Network response was not ok (Status: ${response.status})`);
            
            const data = await response.json();
            
            if (data.success) {
                const fac = data.faculty;
                const stats = data.stats;

                // Populate Text Data
                document.getElementById('fac-name').textContent = fac.fullName || "Unknown Name";
                document.getElementById('fac-dept').textContent = fac.department || fac.branch || "Unassigned";
                document.getElementById('fac-college').innerHTML = `<i class="fas fa-university text-purple-500 mr-1.5"></i> ${fac.collegeName || "Unknown College"}`;
                document.getElementById('fac-id-val').textContent = fac.id;
                
                // Determine Role Display
                const isHod = fac.is_hod === 1 || fac.is_hod === true || String(fac.is_hod) === '1';
                const roleDisplay = isHod ? "Head of Department (HOD)" : "Faculty Member";
                document.getElementById('fac-role-display').textContent = roleDisplay;

                // Configure Email Button
                const emailBtn = document.getElementById('fac-email');
                if (fac.email) {
                    emailBtn.href = `mailto:${fac.email}`;
                } else {
                    emailBtn.style.display = 'none';
                }

                // Generate Initials properly (e.g. "John Doe" -> "JD")
                const nameStr = (fac.fullName || "U N").trim();
                const nameParts = nameStr.split(' ');
                let initials = nameParts[0].charAt(0);
                if (nameParts.length > 1) {
                    initials += nameParts[nameParts.length - 1].charAt(0);
                }
                document.getElementById('fac-avatar').textContent = initials.toUpperCase();

                // Populate Stats
                document.getElementById('stat-prob').textContent = stats.problemsCreated || 0;
                document.getElementById('stat-cont').textContent = stats.activeContests || 0;
                document.getElementById('stat-rating').innerHTML = `${Number(stats.platformRating || 0).toFixed(1)} <i class="fas fa-star text-sm text-yellow-400 ml-1"></i>`;

                // Configure Status Badge styling to match dashboard labels
                const statusBadge = document.getElementById('fac-status');
                const statusText = (fac.status || "Unknown").toLowerCase();
                statusBadge.textContent = statusText;
                
                if (statusText === 'active') {
                    statusBadge.className = "absolute top-4 right-4 px-3 py-1 text-xs font-bold rounded-full bg-green-500/20 text-green-100 backdrop-blur-md border border-green-500/30 uppercase tracking-wide";
                } else if (statusText === 'pending') {
                    statusBadge.className = "absolute top-4 right-4 px-3 py-1 text-xs font-bold rounded-full bg-yellow-500/20 text-yellow-100 backdrop-blur-md border border-yellow-500/30 uppercase tracking-wide";
                } else {
                    statusBadge.className = "absolute top-4 right-4 px-3 py-1 text-xs font-bold rounded-full bg-red-500/20 text-red-100 backdrop-blur-md border border-red-500/30 uppercase tracking-wide";
                }

                // Auto-generate professional bio
                document.getElementById('fac-bio').textContent = 
                    `${fac.fullName} currently serves as a ${roleDisplay} in the ${fac.department || fac.branch || 'unassigned'} department at ${fac.collegeName}.`;
                renderRecentActivity(data.recentActivity || []);

                // Fade out loader, Fade in profile
                loadingState.style.display = 'none';
                profileContent.classList.remove('hidden');

            } else {
                showError(data.message || "Failed to find this faculty member in the database.");
            }
        } catch (error) {
            console.error("Connection Failed:", error);
            showError("Connection Failed. Please check your network or ensure the server is running.");
        }
    });
    </script>
</body>
</html>
