<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Tickets - SuperAdmin</title>
    <link rel="shortcut icon" href="/campuscode-logo.jpeg" type="image/jpeg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    fontFamily: { sans: ["Poppins", "sans-serif"] },
                    colors: {
                        primary: { 50: "#E7F0FA", 100: "#D0E1F5", 200: "#7BA4D0", 300: "#4D84C0", 400: "#2E5E99", 500: "#1E4A7A", 600: "#0D2440" },
                        dark: { bg: "#111827", card: "#1F2937", text: "#F9FAFB", border: "#374151" }
                    }
                }
            }
        };
    </script>
    <style>
        body { font-family: 'Poppins', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        .dark ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #7ba4d0; border-radius: 3px; }
        
        /* Sidebar Styles matching Forum/Dashboard */
        .sidebar { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; }
        .sidebar-brand { display: flex; align-items: center; gap: 0.75rem; min-width: 0; }
        .sidebar-brand-logo { width: 2.25rem; height: 2.25rem; object-fit: contain; flex-shrink: 0; }
        .nav-item {
            transition: all 0.2s ease;
            position: relative;
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            margin-bottom: 0.25rem;
            color: #374151;
            border-radius: 0.5rem;
            cursor: pointer;
            white-space: nowrap;
        }
        .nav-item:hover { background-color: #f3f4f6; }
        .dark .nav-item { color: #d1d5db; }
        .dark .nav-item:hover { background-color: #374151; }
        .nav-item.active { background-color: #d0e1f5; color: #1e4a7a; font-weight: 600; }
        .dark .nav-item.active { background-color: #1e4a7a; color: #ffffff; }
        .nav-item.active::before {
            content: "";
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            height: 60%;
            width: 4px;
            background-color: #2e5e99;
            border-radius: 0 4px 4px 0;
        }
        .dark .nav-item.active::before { background-color: #60a5fa; }
        .nav-item i { width: 1.5rem; text-align: center; margin-right: 0.75rem; font-size: 1.1rem; flex-shrink: 0; }
        .nav-item span { font-size: 0.875rem; }
    </style>
    <link rel="stylesheet" href="/css/role-dark-fixes.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen font-sans transition-colors duration-200">

    <div id="appShell" class="flex h-screen overflow-hidden">
        <aside id="mainSidebar" class="sidebar w-64 bg-white dark:bg-gray-800 shadow-sm border-r border-gray-200 dark:border-gray-700 flex flex-col h-screen flex-shrink-0 transition-colors duration-200 z-50">
            <div class="p-6 flex-shrink-0 flex items-center justify-between h-[88px]">
                <div class="sidebar-brand text-2xl font-bold text-gray-800 dark:text-white overflow-hidden whitespace-nowrap">
                    <img src="/campuscode-logo.jpeg" alt="CampusCode logo" class="sidebar-brand-logo rounded-md shadow-sm">
                    <span class="transition-all duration-300 opacity-100 w-auto">CampusCode<span class="text-primary-400 dark:text-primary-200 text-xs align-top ml-0.5">SA</span></span>
                </div>
            </div>

            <nav class="flex-1 px-4 space-y-1 overflow-y-auto mt-2">
                <p class="px-4 text-[10px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest mb-3 mt-2">Menu</p>
                <a href="/superadmin/dashboard" class="nav-item">
                    <i class="fa-solid fa-building-columns"></i>
                    <span>Manage Colleges</span>
                </a>
                <a href="/superadmin/problems" class="nav-item">
                    <i class="fa-solid fa-code"></i>
                    <span>Manage Problems</span>
                </a>
                <a href="/superadmin/contest" class="nav-item">
                    <i class="fa-solid fa-trophy"></i>
                    <span>Manage Contests</span>
                </a>
                <a href="/superadmin/support" class="nav-item active">
                    <i class="fa-solid fa-life-ring"></i>
                    <span>Support Tickets</span>
                </a>
                <a href="/forum/forum.html" class="nav-item">
                    <i class="fa-solid fa-comments"></i>
                    <span>Community Forum</span>
                </a>
            </nav>

            <div class="p-4 space-y-1 border-t border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 flex-shrink-0 bottom-menu">
                <a href="/auth/logout" class="nav-item text-red-500 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Logout</span>
                </a>
                <div class="w-full text-left flex items-center gap-3 p-3 rounded-xl bg-gray-50 dark:bg-gray-700 mt-2 border border-gray-100 dark:border-gray-600">
                    <div id="sidebarAvatar" class="w-10 h-10 rounded-full bg-primary-500 flex items-center justify-center text-white font-bold text-sm shadow-inner">
                        SA
                    </div>
                    <div class="min-w-0">
                        <div id="sidebarName" class="text-sm font-bold text-gray-800 dark:text-white truncate leading-tight">Superadmin</div>
                        <div class="text-[10px] text-primary-500 dark:text-primary-200 font-semibold uppercase tracking-wider">SuperAdmin</div>
                    </div>
                </div>
            </div>
        </aside>

        <div class="flex-1 overflow-y-auto w-full">
            <header class="bg-white dark:bg-gray-800 shadow-sm transition-colors duration-200 sticky top-0 z-40 border-b border-gray-200 dark:border-gray-700">
                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
                    <div>
                        <h1 class="text-xl font-bold text-gray-800 dark:text-white tracking-tight">Support Tickets</h1>
                        <p class="text-xs font-medium text-gray-500 dark:text-gray-400 mt-0.5">Resolve user issues across the platform.</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="toggleTheme()" class="p-2 rounded-full text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 focus:outline-none transition-transform active:scale-95 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600">
                            <i id="theme-toggle-dark-icon" class="fa-solid fa-moon dark:hidden text-lg"></i>
                            <i id="theme-toggle-light-icon" class="fa-solid fa-sun hidden dark:block text-lg"></i>
                        </button>
                        <button class="p-2 rounded-full text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 focus:outline-none transition-transform active:scale-95 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 relative">
                            <i class="fa-solid fa-bell text-lg"></i>
                            <span class="absolute top-0 right-0 h-2 w-2 rounded-full bg-red-500 border-2 border-white dark:border-gray-800"></span>
                        </button>
                    </div>
                </div>
            </header>

            <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 text-gray-800 dark:text-gray-100">

                <section class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden transition-colors duration-200">
                    <div class="px-6 py-5 flex justify-between items-center border-b border-gray-100 dark:border-gray-700 bg-gray-50/50 dark:bg-gray-800/50 flex-wrap gap-4">
                        <h3 class="text-lg font-semibold text-gray-800 dark:text-white flex items-center">
                            <span class="w-2 h-6 bg-blue-500 rounded-full mr-3"></span>Ticket Queue
                            <span id="ticketCount" class="ml-3 px-2.5 py-0.5 rounded-full bg-gray-200 dark:bg-gray-700 text-xs font-bold text-gray-600 dark:text-gray-300">...</span>
                        </h3>
                        <div class="flex items-center gap-3">
                            <select id="statusFilter" class="px-4 py-2 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-primary-400 focus:border-transparent outline-none transition-all shadow-sm">
                                <option value="all">All Statuses</option>
                                <option value="open">Open</option>
                                <option value="reopened">Reopened</option>
                                <option value="in_progress">In Progress</option>
                                <option value="resolved">Resolved</option>
                            </select>
                            <button onclick="loadTickets()" class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 bg-gray-100 hover:bg-gray-200 dark:bg-gray-700 dark:hover:bg-gray-600 px-3 py-2 rounded-xl text-sm font-medium transition-colors border border-gray-200 dark:border-gray-600 shadow-sm flex items-center gap-1.5">
                                <i class="fas fa-sync-alt"></i> <span class="hidden sm:inline">Refresh</span>
                            </button>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-[960px]">
                            <thead>
                                <tr class="text-[11px] font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800">
                                    <th class="px-6 py-4 w-16">ID</th>
                                    <th class="px-6 py-4 w-48">User Details</th>
                                    <th class="px-6 py-4 min-w-[200px]">Subject & Issue</th>
                                    <th class="px-6 py-4 text-center">Category</th>
                                    <th class="px-6 py-4 text-center">Status</th>
                                    <th class="px-6 py-4 min-w-[250px]">Your Reply</th>
                                    <th class="px-6 py-4 text-right min-w-[180px]">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="ticketTableBody" class="divide-y divide-gray-100 dark:divide-gray-700">
                                <tr><td colspan="7" class="py-10 text-center text-gray-500 dark:text-gray-400 italic">Loading tickets...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </section>

            </main>
        </div>
    </div>

    <script>
        // Theme initialization
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        async function loadCurrentUser() {
            try {
                const r = await fetch('/api/forum/me');
                const d = await r.json();
                if (!d.success || !d.user) return;
                const n = d.user.fullName || 'Superadmin';
                const i = n.split(' ').filter(Boolean).slice(0, 2).map(p => p[0]).join('').toUpperCase() || 'SA';
                document.getElementById('sidebarName').textContent = n;
                document.getElementById('sidebarAvatar').textContent = i;
            } catch (_) {}
        }

        function esc(value) {
            return String(value || '').replace(/[&<>"']/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
        }

        function statusBadge(status) {
            const s = String(status || '').toLowerCase();
            if (s === 'resolved') return '<span class="bg-green-50 text-green-700 border border-green-200 dark:border-green-800 dark:bg-green-900/30 dark:text-green-400 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider">Resolved</span>';
            if (s === 'reopened') return '<span class="bg-purple-50 text-purple-700 border border-purple-200 dark:border-purple-800 dark:bg-purple-900/30 dark:text-purple-300 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider">Reopened</span>';
            if (s === 'in_progress') return '<span class="bg-amber-50 text-amber-700 border border-amber-200 dark:border-amber-800 dark:bg-amber-900/30 dark:text-amber-400 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider">In Progress</span>';
            return '<span class="bg-blue-50 text-blue-700 border border-blue-200 dark:border-blue-800 dark:bg-blue-900/30 dark:text-blue-400 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider">Open</span>';
        }

        async function updateTicket(id, nextStatus) {
            const replyInput = document.getElementById(`reply-${id}`);
            const reply = replyInput ? replyInput.value.trim() : '';
            
            if (nextStatus === 'resolved' && !reply) {
                alert('Please add a solution/reply before marking this ticket as resolved.');
                if (replyInput) replyInput.focus();
                return;
            }
            
            const btn = document.activeElement;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            
            try {
                const res = await fetch(`/superadmin/api/support-tickets/${id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: nextStatus, reply })
                });
                const data = await res.json();
                if (!res.ok || !data.success) {
                    alert(data.error || data.message || 'Failed to update ticket.');
                    btn.innerHTML = originalText;
                    return;
                }
                loadTickets();
            } catch (error) {
                alert('An error occurred. Please try again.');
                btn.innerHTML = originalText;
            }
        }

        async function loadTickets() {
            const status = document.getElementById('statusFilter').value;
            const tbody = document.getElementById('ticketTableBody');
            const count = document.getElementById('ticketCount');
            
            tbody.innerHTML = '<tr><td colspan="7" class="py-10 text-center text-gray-500 dark:text-gray-400 italic">Loading tickets...</td></tr>';
            
            try {
                const res = await fetch(`/superadmin/api/support-tickets?status=${encodeURIComponent(status)}`);
                const data = await res.json();
                
                if (!res.ok || !data.success) {
                    tbody.innerHTML = '<tr><td colspan="7" class="py-10 text-center text-red-500 font-medium">Failed to load tickets.</td></tr>';
                    count.textContent = '0';
                    return;
                }
                
                const tickets = data.tickets || [];
                count.textContent = tickets.length;
                
                if (!tickets.length) {
                    tbody.innerHTML = '<tr><td colspan="7" class="py-10 text-center text-gray-500 dark:text-gray-400 italic">No tickets found for this filter.</td></tr>';
                    return;
                }
                
                tbody.innerHTML = tickets.map((t) => `
                    <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50 transition">
                        <td class="px-6 py-4 text-gray-500 dark:text-gray-400 font-mono text-sm align-top pt-5">#${t.id}</td>
                        <td class="px-6 py-4 align-top pt-5">
                            <div class="font-bold text-sm text-gray-900 dark:text-gray-100">${esc(t.requester_name)}</div>
                            <div class="text-xs text-gray-500 dark:text-gray-400 mt-0.5 truncate max-w-[150px]" title="${esc(t.requester_email)}">${esc(t.requester_email)}</div>
                            <div class="mt-1"><span class="bg-gray-100 text-gray-600 border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-gray-300 px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider">${esc(t.requester_role)}</span></div>
                        </td>
                        <td class="px-6 py-4 align-top pt-5">
                            <div class="font-bold text-sm text-gray-800 dark:text-white mb-1">${esc(t.subject)}</div>
                            <div class="text-xs text-gray-600 dark:text-gray-400 bg-gray-50 dark:bg-gray-800/50 p-2 rounded-lg border border-gray-100 dark:border-gray-700 line-clamp-3" title="${esc(t.details)}">${esc(t.details)}</div>
                        </td>
                        <td class="px-6 py-4 text-center text-sm font-medium text-gray-700 dark:text-gray-300 align-top pt-5">${esc(t.category)}</td>
                        <td class="px-6 py-4 text-center align-top pt-5">${statusBadge(t.status)}</td>
                        <td class="px-6 py-4 align-top pt-4">
                            <textarea id="reply-${t.id}" class="w-full min-w-[200px] px-3 py-2 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm text-gray-900 dark:text-gray-100 placeholder-gray-400 focus:ring-2 focus:ring-primary-400 focus:border-transparent outline-none transition-all resize-y" rows="2" placeholder="Write response...">${esc(t.superadmin_reply || '')}</textarea>
                        </td>
                        <td class="px-6 py-4 text-right align-top pt-5 space-y-2">
                            <button onclick="updateTicket(${t.id}, 'in_progress')" class="w-full inline-flex justify-center items-center text-amber-600 hover:text-amber-700 transition bg-amber-50 hover:bg-amber-100 dark:bg-amber-900/30 dark:text-amber-400 dark:hover:bg-amber-900/50 border border-amber-100 dark:border-amber-800 px-3 py-1.5 rounded-lg text-xs font-semibold shadow-sm">
                                <i class="fas fa-spinner mr-1.5"></i> In Progress
                            </button>
                            <button onclick="updateTicket(${t.id}, 'resolved')" class="w-full inline-flex justify-center items-center text-green-600 hover:text-green-700 transition bg-green-50 hover:bg-green-100 dark:bg-green-900/30 dark:text-green-400 dark:hover:bg-green-900/50 border border-green-100 dark:border-green-800 px-3 py-1.5 rounded-lg text-xs font-semibold shadow-sm">
                                <i class="fas fa-check mr-1.5"></i> Resolve
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="7" class="py-10 text-center text-red-500 font-medium">Network error. Please try again.</td></tr>';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadCurrentUser();
            document.getElementById('statusFilter').addEventListener('change', loadTickets);
            loadTickets();
        });
    </script>
    <script src="/js/role-logo-fixes.js"></script>
</body>
</html>
